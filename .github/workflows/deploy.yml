name: Deploy WMW (via Proxy)

on:
  push:
    branches: ["main"]

env:
  PROJECT_NAME: wmw

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- BUILD SECTION ---
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y

      - name: Build Release
        run: cargo leptos build --release

      # --- DEPLOY SECTION ---

      # 1. TRUST KEYS (Prevents "Host Key Verification Failed")
      - name: Trust Server Keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROXY_HOST }} >> ~/.ssh/known_hosts

      # 2. UPLOAD BINARY (To /tmp first to avoid permission errors)
      - name: Upload Binary to Temp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          # Upload to temp folder first
          source: "target/release/${{ env.PROJECT_NAME }}"
          target: "/tmp"
          strip_components: 2
          overwrite: true

      # 3. UPLOAD ASSETS (To /tmp first)
      - name: Upload Assets to Temp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          # Upload to temp folder first
          source: "target/site"
          target: "/tmp/leptos_site"
          strip_components: 1
          overwrite: true

      # 4. INSTALL & RESTART (Move files with sudo)
      - name: Install and Restart
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          # This action DOES support options, so we use them here for safety
          proxy_strict: false
          script: |
            # 1. Move Binary (using sudo to overwrite protected files)
            sudo mv /tmp/${{ env.PROJECT_NAME }} /var/www/rutst/test_sikormedia_com/${{ env.PROJECT_NAME }}
            sudo chmod +x /var/www/rutst/test_sikormedia_com/${{ env.PROJECT_NAME }}

            # 2. Move Site Assets (Clean old folder first)
            sudo rm -rf /var/www/leptos_app/*
            sudo cp -r /tmp/leptos_site/* /var/www/leptos_app/
            sudo rm -rf /tmp/leptos_site

            # 3. Restart Service
            sudo systemctl restart wmw
            sudo systemctl status wmw --no-pager
