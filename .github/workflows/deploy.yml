name: Debug SSH Connection
on: push

jobs:
  debug-deploy:
    runs-on: ubuntu-22.04
    steps:
      # 1. Create a dummy file on the GitHub Runner
      - name: Create Dummy File
        run: echo "Connection Successful! Timestamp $(date)" > debug_test.txt

      # 2. TRUST KEYS (Crucial step from before)
      - name: Trust Server Keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROXY_HOST }} >> ~/.ssh/known_hosts

      # 3. Try to Copy the file (Tunneling: GitHub -> PVE -> Webserver)
      - name: Test SCP to Private VM
        uses: appleboy/scp-action@master
        with:
          # Target (Private VM)
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          # Proxy (Public PVE Host)
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          proxy_strict: false

          # Copy the dummy file
          source: "debug_test.txt"
          target: "/home/sikor/"
          # ^ Using home folder is safer for a test (no permission issues)

          options: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

      # 4. Verify it arrived (Optional check)
      - name: Verify File Exists
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          proxy_strict: false

          script: |
            cat /home/sikor/debug_test.txt
            rm /home/sikor/debug_test.txt
