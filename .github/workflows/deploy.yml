name: Deploy WMW (via Proxy)

on:
  push:
    branches: ["main"]

env:
  PROJECT_NAME: wmw

jobs:
  deploy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- BUILD SECTION (Optimized) ---

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      # 1. FAST INSTALL: Downloads binary instead of compiling (saves ~5 mins)
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # 2. CACHING: Saves dependencies so next run is instant
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y

      - name: Build Release
        run: cargo leptos build --release

      # --- DEPLOY SECTION ---

      # 3. FIX CONNECTION: Add PVE Host to known_hosts to prevent "Verification Failed"
      - name: Trust Server Keys
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.PROXY_HOST }} >> ~/.ssh/known_hosts

      # 4. Copy Binary (Tunnel: GitHub -> PVE Host -> Private Webserver)
      - name: Copy Binary to VPS
        uses: appleboy/scp-action@master
        with:
          # Target (Private VM)
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          # Proxy (Public PVE Host)
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          proxy_strict: false # Disable strict checking for the Jump Host

          # Files
          source: "target/release/${{ env.PROJECT_NAME }}"
          target: "/var/www/rutst/test_sikormedia_com"
          strip_components: 2
          overwrite: true
          # Disable strict checking for the Target VM
          options: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

      # 5. Copy Site Assets
      - name: Copy Site Assets to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          proxy_strict: false

          source: "target/site"
          target: "/var/www/leptos_app"
          strip_components: 1
          overwrite: true
          options: "-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

      # 6. Restart Service
      - name: Restart Systemd
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}
          proxy_strict: false

          # NOTE: Ensure user 'sikor' has NOPASSWD sudo rights for systemctl!
          script: |
            chmod +x /var/www/rutst/test_sikormedia_com/${{ env.PROJECT_NAME }}
            sudo systemctl restart wmw
            sudo systemctl status wmw --no-pager
