name: Deploy WMW (via Proxy)

on:
  push:
    branches: ["main"]

env:
  PROJECT_NAME: wmw

jobs:
  deploy:
    # Using ubuntu-22.04 ensures compatibility with Debian 12/13 glibc versions
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # --- BUILD OPTIMIZATIONS ---

      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown

      # FAST FIX: Install binstall via script (seconds) instead of compiling (minutes)
      - name: Install cargo-binstall (Fast Binary)
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash

      # CACHING: Saves dependencies so the 2nd run is nearly instant
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y

      - name: Build Release
        run: cargo leptos build --release

      # --- DEPLOY SECTION ---

      # 1. Copy the Binary (Tunneling: GitHub -> PVE Host -> Private Webserver)
      - name: Copy Binary to VPS
        uses: appleboy/scp-action@master
        with:
          # --- TARGET (Private VM: 192.168.1.50) ---
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          # --- PROXY (Public PVE Host) ---
          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          # --- FILES ---
          source: "target/release/${{ env.PROJECT_NAME }}"
          target: "/var/www/rutst/test_sikormedia_com"
          strip_components: 2
          overwrite: true

      # 2. Copy the Site Assets (Tunneling)
      - name: Copy Site Assets to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          source: "target/site"
          target: "/var/www/leptos_app"
          strip_components: 1
          overwrite: true

      # 3. Restart the Service (Tunneling)
      - name: Restart Systemd
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}

          proxy_host: ${{ secrets.PROXY_HOST }}
          proxy_username: ${{ secrets.PROXY_USER }}
          proxy_key: ${{ secrets.PROXY_KEY }}

          script: |
            # 1. Make sure binary is executable
            chmod +x /var/www/rutst/test_sikormedia_com/${{ env.PROJECT_NAME }}

            # 2. Restart the service
            # (Ensure 'sikor' has passwordless sudo for systemctl, or this will hang)
            sudo systemctl restart wmw

            # 3. Check status
            sudo systemctl status wmw --no-pager
