name: Deploy WMW (Secure)
on:
  push:
    branches: ["main"]
env:
  PROJECT_NAME: wmw
jobs:
  deploy:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
      - name: Install Rust Nightly
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: wasm32-unknown-unknown
      - name: Install cargo-binstall
        run: curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
      - name: Install cargo-leptos
        run: cargo binstall cargo-leptos -y --force
      - name: Build Release
        run: cargo leptos build --release
      - name: Upload Binary to Temp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          fingerprint: sha256
          source: "target/release/${{ env.PROJECT_NAME }}"
          target: "/tmp"
          strip_components: 2
          overwrite: true
      - name: Upload Assets to Temp
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          fingerprint: sha256
          source: "target/site"
          target: "/tmp/leptos_site"
          strip_components: 1
          overwrite: true
      - name: Run Deploy Script
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_KEY }}
          port: 2222
          fingerprint: sha256
          script: sudo /usr/local/bin/deploy_wmw.sh
